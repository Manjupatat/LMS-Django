{% extends "base.html" %}
{% block title %}Courses - LMS{% endblock %}
{% block content %}
<h1> <a href="{% url 'home' %}" class="btn btn-secondary">Back to Home</a></h1>
<h2>Available Courses</h2>
<div class="row">
    {% for course in courses %}
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ course.name }}</h5>
                <p class="card-text">{{ course.description|truncatechars:100 }}</p>
                <a href="{% url 'course_detail' course.id %}" class="btn btn-primary">View Course</a>
            </div>
        </div>
    </div>
    {% empty %}
    <p>No courses available yet.</p>
    {% endfor %}
</div>
{% endblock %}
